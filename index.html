<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Frontend Mentor | Intro component with sign up form</title>
  </head>
  <body>
    <main class="main">
      <div class="heading">
        <h1 class="title">Learn to code by watching others</h1>
        <p class="text">See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.</p>
      </div>
      <div class="content">
        <div class="offer-banner"><span>Try it free 7 days</span> then $20/mo. thereafter</div>
        <form action="" class="form">
          <input type="text" name="" id="" placeholder="First Name*" required pattern="^[A-Z][a-z]{3,7}$" />
          <input type="text" name="" id="" placeholder="Last Name*" required pattern="^[A-Z][a-z]{3,7}$"/>
          <input type="email" name="" id="" placeholder="Email Address*" required />
          <input type="password" name="" id="" placeholder="Password" required />
          <input type="submit" value="Claim your free trial" />
          <p class="terms">By clicking the button, you are agreeing to our <span>Terms and Services</span></p>
        </form>
      </div>
    </main>
  </body>
</html>
